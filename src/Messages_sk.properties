splay = Splay-ovanie

splay-found = Nájdené. Tento vrchol budeme splayovať.

splay-higher = Kľúč #1 sa v strome nenachádza. Namiesto toho vysplayujeme najbližší väčší kľúč, #2.

splay-insert-left = Všimnite si teraz, že koreň a celý ľavý podstrom je menší ako #1, zatiaľčo celý pravý podstrom je väčší ako #1.

splay-insert-left2 = Z #1 spravíme jednoducho nový koreň, starý koreň pripojíme vľavo a pravý podstrom vpravo.

splay-insert-right = Všimnite si teraz, že koreň a celý pravý podstrom je väčší ako #1, zatiaľčo celý ľavý podstrom je menší ako #1.

splay-insert-right2 = Z #1 spravíme jednoducho nový koreň, starý koreň pripojíme vpravo a ľavý podstrom vľavo.

splay-lower = Kľúč #1 sa v strome nenachádza. Namiesto toho vysplayujeme najbližší menší kľúč, #2.

splay-root = Vrchol nemá starého otca; spravíme iba jednu rotáciu.

splay-start = Najskôr nájdeme vysplayujeme #1 vysplayujeme ho do koreňa. Ak #1 nie je v strome, vysplayujeme najbližší väčší alebo najbližší menší kľúč.

splay-zig-zag-left = Prípad "Cik-cak" (#1 je ľavý syn zatiaľčo #2 je pravý syn): vrchol #1 dvakrát zrotujeme.

splay-zig-zag-right = Prípad "Cik-cak" (#1 je pravý syn zatiaľčo #2 je ľavý syn): vrchol #1 dvakrát zrotujeme.

splay-zig-zig-left = Prípad "Cik-cik" (#1 aj #2 sú ľavý synovia): najskôr zrotujeme #2, potom #1.

splay-zig-zig-right = Prípad "Cik-cik" (#1 aj #2 sú pravý synovia): najskôr zrotujeme #2, potom #1.

splaydelete = Odstránime koreň a vysplayujeme minimum pravého podstromu.

splaydeleteleft = Koreň nemá pravého syna; jednoducho ho odstránime a z ľavého syna spravíme nový koreň.

