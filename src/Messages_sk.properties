rbdelete1 = Prípad I: červený súrodenec: Vymeníme farby otca a pravého súrodenca a zrotujeme súrodenca; dostaneme tak prípad II, III, alebo IV.

rbdelete2 = Prípad II, súrodenec a obe jeho deti sú čierne: the extra black is moved up the tree.

rbdelete3 = Prípad III, súrodenec a jeho "vonkajší" syn sú čierni, jeho "vnútorný" syn je červený: Prevedieme na prípad IV.

rbdelete4 = Prípad IV, súrodenec a jeho "vnútorný" syn sú čierni, jeho "vonkajší" syn je červený: Vymeníme farby otca a súrodenca, zrotujeme ho a jeho červeného syna zafarbíme na čierno.

