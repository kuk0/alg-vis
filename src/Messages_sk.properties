intervalfind = Môžu nastať tri prípady vzájomnej polohy intervalu, ktorý reprezentuje vrchol momentálne uvažovaný DFS (a) a intervalu, ktorý hľadáme (b). \r\n<br/>1. Nepretínajú sa - v prehľadávaní vynecháme podstrom zakorenený v tomto vrchole. \r\n<br/>2. Pretínajú sa ale interval (a) nie je vnorený do intervalu (b) - pokračujeme v prehľadávaní v podstrome. \r\n<br/>3. Interval (a) je vnorený do intervalu (b) - našli sme vrchol, ktorý reprezentuje časť intervalu, ktorý hľadáme, takže nepokračujeme v hľadaní v podstrome.

intervalin = Interval ⟨#4,#5⟩, ktorý reprezentuje vrchol #3 je vnorený do intervalu ⟨#1,#2⟩.

