intervalfind = There are three cases in terms of the relation between the current node's interval C and the searched interval I: \r\n<br/>1. Disjoint — skip the subtree rooted at this node. \r\n<br/>2. Overlap, but C is not contained in I — continue searching both subtrees. \r\n<br/>3. C is contained in I — include this node (update the result) and do not descend further.

