intervalmax = Choose the larger key of #2 and #1.

intervalmin = Choose the smaller key of #1 and #2.

intervalout = Node #3 represents interval ⟨#4,#5⟩, which does not intersect ⟨#1,#2⟩.

intervalpart = Node #3 represents interval ⟨#4,#5⟩, which partially overlaps ⟨#1,#2⟩.

intervalsum = The node's value is the sum of its left and right children: #2 + #1.

