pairlrrl1 = For "left-to-right then right-to-left" pairing, first pair trees left-to-right (link 1st with 2nd, 3rd with 4th, ...).

pairlrrl2 = Then link each remaining tree to the last one, working right-to-left.

pairnaive = For the "naive" combining rule, pick one tree and successively link the remaining trees to it.

pq = Priority queues

previous = Previous

rbdelete1 = Case I: Node's sibling is red — recolor some nodes and transform to Case II, III, or IV.

rbdelete2 = Case II: Node's sibling and both its children are black — move the extra black up the tree.

rbdelete3 = Case III: Node's sibling is black, the nearer child is red and the farther one is black — transform to Case IV.

rbdelete4 = Case IV: Node's sibling and its nearer child are black while the farther child is red — recolor and rotate to remove the extra black.

rbinsertcase1 = Case I, red uncle: Color the parent and uncle black, color the grandparent red, and continue from the grandparent.

rbinsertcase2 = Case II, black uncle, "inner" node: Transform this to Case III.

rbinsertcase3 = Case III, black uncle, "outer" node: Perform a rotation and recolor the nodes.

redblack = Red-black tree

