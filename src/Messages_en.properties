skipfindstart = Start searching at the top-left corner.

skipinsertafter = Insert the new node immediately after this one.

skipinsertnext = The next key is less than our key — insert to the right.

skipinsertstart = Start at the top-left corner and find the appropriate insertion point.

skiplist = Skiplist

skiplist-delete-found = We have found the node to delete.

skiplist-down = Next key > #1, so go down.

skiplist-head = Toss ##1: HEADS. Promote the node.

skiplist-next = Next key ≤ #1, so go right.

skiplist-tail = Toss ##1: TAILS. Stop.

skiplist-tossing = Toss a coin until it comes TAILS. For each HEAD, promote the node one level; on average there will be 1/2^k nodes on level k.

splay = Splay

splay-found = Found. Splay this node.

splay-higher = Key #1 is not in the tree; splay #2, the smallest larger key instead.

splay-insert-left = Note that the root and its left subtree is less than #1 while the whole root's right subtree is greater than #1.

splay-insert-left2 = Make #1 the new root, attach the current root as its left child and the current root's right subtree as the new right subtree.

splay-insert-right = Note that the root and its right subtree is greater than #1 while the whole root's left subtree is less than #1.

splay-insert-right2 = Make #1 the new root, attach the current root as its right child and the current root's left subtree as the new left subtree.

splay-lower = Key #1 is not in the tree; splay #2, the largest smaller key instead.

splay-root = No grandparent exists; perform a single rotation.

splay-start = Start by splaying #1; this brings it to the root. If #1 is not in the tree, splay the smallest higher or the largest lower key instead.

splay-zig-zag-left = Zig-zag case (#1 is a left child and #2 is a right child): rotate #1 twice.

splay-zig-zag-right = Zig-zag case (#1 is a right child and #2 is a left child): rotate #1 twice.

splay-zig-zig-left = Zig-zig case (both #1 and #2 are left children): rotate #2, then #1.

splay-zig-zig-right = Zig-zig case (both #1 and #2 are right children): rotate #2, then #1.

splaydelete = Delete the root, then splay the right subtree for the minimum.

splaydeleteleft = The root has no right subtree; delete it and make its left child the new root.

splaydeletelink = The minimum of the right subtree becomes the new root; since it has no left child, attach the left subtree.

splaydeleteright = The root has no left subtree; delete it and make its right child the new root.

splayinroot = Now the key (or the nearest smaller/larger key) is at the root.

splaytree = Splay tree

